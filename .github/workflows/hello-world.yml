name: Hello World
on: 
  workflow_dispatch:
jobs: 
  hello_job:
    runs-on: ubuntu-latest
    steps:
    - name: Echo text
      run: |
        echo "Hello, world!"
        echo "testing the schedule"
  test_concurrency:
    runs-on: ubuntu-latest
    needs: hello_job
    concurrency:
        cancel-in-progress: true
        group: "prod server"
    steps:
    - name: test job concurrency
      run: |
        echo "this job is in progress"
        sleep 600s
        
    


